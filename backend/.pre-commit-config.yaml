repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run --project backend --active --frozen ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff-format
        entry: uv run --project backend --active --frozen ruff format
        language: system
        types: [python]
        require_serial: true
      - id: pyright
        name: pyright
        entry: uv run --project backend --active --frozen pyright --project backend
        language: system
        types: [python]
        pass_filenames: false